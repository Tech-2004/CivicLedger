version: 2
updates:
  # npm dependencies (root lockfile covers all workspaces).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk bumps into a single PR to cut noise.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Keep GitHub Actions pinned actions up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
