name: PR Title

# Enforces Conventional-Commit style PR titles (feat:, fix:, ci:, chore: ...).
# Non-blocking by default (not a required check) - promote to required later.
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint-title:
    name: pr-title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            ci
            docs
            refactor
            perf
            test
            build
            revert
